<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Tasnim Ullah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      background: #050505;
      color: #fff;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 20vw, 16rem);
      line-height: 0.85;
      background: linear-gradient(135deg, #fff 0%, #ff1a1a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-top: 1rem;
      margin-bottom: 3rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      border-radius: 99px;
      background: #ff1a1a;
      color: #fff;
      border: none;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,26,26,0.5);
      transition: all 0.3s;
    }
    .back-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 30px rgba(255,26,26,0.5);
    }
    .void-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(58,0,0,0.4), transparent 70%);
      border-radius: 50%;
      filter: blur(100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }
    .content { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="void-glow"></div>
  <div class="content">
    <div class="code">404</div>
    <p class="subtitle">This page doesn't exist in the void.</p>
    <a href="/" class="back-btn">← Return Home</a>
  </div>
</body>
</html>
